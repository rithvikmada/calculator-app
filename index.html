<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="script.js" defer></script>
    <title>Document</title>
</head>
<body>
    <!-- Display for showing calculation -->

    <h1 id="display"></h1>

    <!-- Number buttons 0-9 -->

    <div id="digit-btns">
        <button>0</button>
        <button>1</button>
        <button>2</button>
        <button>3</button>
        <button>4</button>
        <button>5</button>
        <button>6</button>
        <button>7</button>
        <button>8</button>
        <button>9</button>
    </div>

    <!-- Operation buttons +, -, *, /, = -->

    <div id="operation-btns">
        <button>+</button>
        <button>-</button>
        <button>*</button>
        <button>/</button>
    </div>

    <div id="calculate-btn">
        <button>=</button>
    </div>
</body>
</html>
